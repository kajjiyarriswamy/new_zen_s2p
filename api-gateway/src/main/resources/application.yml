server:
  port: 8080

spring:
  application:
    name: api-gateway

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/batch_hyd
    username: appuser
    password: App@123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  cloud:
    gateway:
      routes:

        - id: pr-service
          uri: http://localhost:8081
          predicates:
            - Path=/pr/**
          filters:
            - StripPrefix=0

        - id: po-service
          uri: http://localhost:8082
          predicates:
            - Path=/po/**
          filters:
            - StripPrefix=0

        - id: budget-service
          uri: http://localhost:8082
          predicates:
            - Path=/budget/**
          filters:
            - StripPrefix=0

        - id: admin-service
          uri: http://localhost:8084
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=0

        - id: user-service
          uri: http://localhost:8085
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=0

        - id: vendor-service
          uri: http://localhost:8086
          predicates:
            - Path=/vendor/**
          filters:
            - StripPrefix=0

logging:
  level:
    com.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG

  kafka:
    bootstrap-servers: localhost:9092
